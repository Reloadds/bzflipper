name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - '**'
  workflow_dispatch:

# Allow the release step to create/attach to GitHub Releases.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the "commit jars to dist/" step can rebase before pushing.
          fetch-depth: 0

      # JDK 25 for the BUILD toolchain — the newest Fabric Loom (resolved fresh
      # each run) now requires JVM 25 to run. The mod still targets Java 21 bytecode
      # (build.gradle: release = 21) for the Minecraft 1.21.11 runtime.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Resolve real Fabric versions for the target Minecraft
        run: |
          MC=$(grep '^minecraft_version=' gradle.properties | cut -d= -f2)
          echo "Target Minecraft: $MC"

          YARN=$(curl -s "https://meta.fabricmc.net/v2/versions/yarn/$MC" | jq -r '.[0].version // empty')
          LOADER=$(curl -s "https://meta.fabricmc.net/v2/versions/loader" | jq -r '[.[]|select(.stable==true)][0].version // empty')
          FAPI=$(curl -s "https://api.modrinth.com/v2/project/fabric-api/version?game_versions=%5B%22$MC%22%5D&loaders=%5B%22fabric%22%5D" | jq -r '.[0].version_number // empty')
          # Newest published Loom release. (It targets a specific Gradle version — see
          # the "Set up Gradle" step, which uses 'current' so it's new enough.)
          META=$(curl -s https://maven.fabricmc.net/net/fabricmc/fabric-loom/maven-metadata.xml)
          LOOM=$(echo "$META" | grep -oP '(?<=<release>)[^<]+' | head -1)
          [ -z "$LOOM" ] && LOOM=$(echo "$META" | grep -oP '(?<=<latest>)[^<]+' | head -1)

          echo "Resolved -> yarn=$YARN  loader=$LOADER  fabric-api=$FAPI  loom=$LOOM"

          if [ -z "$YARN" ]; then
            echo "::error::No Yarn mappings exist for Minecraft $MC. That version may not be published/supported. Edit minecraft_version in gradle.properties to a supported 1.21.x release."
            exit 1
          fi
          [ -n "$LOADER" ] && sed -i "s|^loader_version=.*|loader_version=$LOADER|" gradle.properties
          sed -i "s|^yarn_mappings=.*|yarn_mappings=$YARN|" gradle.properties
          if [ -n "$FAPI" ]; then
            sed -i "s|^fabric_version=.*|fabric_version=$FAPI|" gradle.properties
          else
            echo "::warning::No Fabric API build found for $MC; using the value already in gradle.properties."
          fi
          if [ -n "$LOOM" ]; then
            sed -i -E "s/(id 'fabric-loom' version ')[^']*(')/\1$LOOM\2/" build.gradle
          fi

          echo "----- effective gradle.properties -----"; cat gradle.properties
          echo "----- loom line -----"; grep fabric-loom build.gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 'current'

      - name: Build
        run: gradle build --stacktrace --warning-mode all

      - name: Upload mod jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bzflipper-jar
          path: build/libs/*.jar
          if-no-files-found: error

      # Refresh the committed dist/ jars with this build, so the copy in the repo
      # always matches the latest code. Only on direct pushes to main (not tags/PRs).
      #
      # Loop-safe: the push uses GITHUB_TOKEN, and GitHub does NOT trigger new
      # workflow runs for GITHUB_TOKEN pushes; the "[skip ci]" tag is a second guard.
      - name: Commit built jars to dist/
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Drop the CI-only version edits so ONLY the dist/ jars get committed.
          git checkout -- gradle.properties build.gradle || true

          mkdir -p dist
          rm -f dist/*.jar
          cp build/libs/*.jar dist/
          git add -f dist/*.jar

          if git diff --cached --quiet; then
            echo "dist jars unchanged — nothing to commit"
            exit 0
          fi

          git commit -m "ci: refresh dist/ jars from build ${GITHUB_SHA::7} [skip ci]"
          # Rebase onto any commits pushed while we were building, then push back.
          git pull --rebase origin main
          git push origin HEAD:main

      # When the push is a version tag (e.g. v0.1.0), publish a GitHub Release
      # with the built jars attached for direct download.
      - name: Publish Release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/libs/*.jar
          fail_on_unmatched_files: true
